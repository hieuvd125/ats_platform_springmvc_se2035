<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>

</head>
<body>
<div class="container mt-5">
    <div class="row d-flex justify-content-center">
        <div class="col-md-5 border rounded-2 shadow-lg p-4" style="height: 500px">
            <h2 class="m-3 text-center">ATS PLATFORM LOGIN</h2>
            <p class="text-danger" th:text="${errorMessage}"></p>
            <form th:action="@{/auths/login}" method="post">
                <div class="mb-4">
                    <label for="email" class="form-label fw-bold">Email address</label>
                    <input type="email" class="form-control p-2" id="email" name="email" placeholder="name@example.com">
                </div>
                <div class="mb-5">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control p-2 " id="password" name="password"
                           placeholder="*******"/>
                </div>
                <button type="submit" class="btn btn-info w-100 py-2">Submit</button>
                <p class="text-center mt-5">Not registered? <a href="#">Create an account</a></p>
            </form>

        </div>
    </div>
</div>

</body>
</html>
