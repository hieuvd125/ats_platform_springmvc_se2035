<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Job Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>

</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ATS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Job Management</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.user.fullName}">

                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>

            </div>
        </div>
    </nav>

    <div class="row p-4 d-flex justify-content-center mt-5">
        <h2>Job Detail</h2>
        <hr>
        <div class="text-success" th:text="${message}"></div>
        <form class="row" th:action="@{/jobs}" th:object="${job}" method="post" id="job-form">
            <div class="col-md-5">
                <!--Left-->
                <div class="mb-3">
                    <label class="form-label">Title</label>
                    <input type="text" class="form-control" th:field="*{title}" required placeholder="Enter job title">
                </div>
                <div class="mb-3">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" th:field="*{location}" required placeholder="Enter job location">
                </div>
                <div class="mb-3">
                    <label class="form-label">Min salary</label>
                    <input type="number" th:field="*{minSalary}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Max salary</label>
                    <input type="number" th:field="*{maxSalary}" class="form-control" required>
                </div>
            </div>
            <div class="col-md-5">
                <!--Right-->
                <div class="mb-3">
                    <label class="form-label">Deadline</label>
                    <input type="date" th:field="*{deadline}" class="form-control" required>
                </div>

                <select class="form-select mb-3" aria-label="Default select example" th:field="*{departmentId}">
                    <option selected value="">Open this select menu</option>
                    <option th:each="dept: ${departments}" th:value="${dept.id}"
                            th:text="${dept.departmentName}"></option>
                </select>

                <div class="mb-3">
                    <label class="form-label">Skills</label>

                    <div class="form-check form-check-inline" th:each="skill: ${skills}">
                        <input class="form-check-input" type="checkbox"
                               th:value="${skill.id}" th:field="*{skillIds}">
                        <label class="form-check-label" th:text="${skill.skillName}"></label>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea class="form-control" rows="6" th:field="*{description}"></textarea>
                </div>

                <button type="submit" class="btn btn-primary px-3">Save</button>
                <button type="button" class="btn btn-primary px-3">Close</button>
            </div>
        </form>
    </div>

</div>
<script>

    //     e.preventDefault();
    //
    //     const  data = fetch("/api/jobs", {})
    //
    // })
</script>
</body>
</html>
