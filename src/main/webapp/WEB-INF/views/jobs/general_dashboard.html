<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
            crossorigin="anonymous"></script>

</head>
<body>
<div class="container-fluid">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">ATS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Job Management</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button"
                           data-bs-toggle="dropdown" aria-expanded="false" th:text="${session.user.fullName}">

                        </a>
                        <ul class="dropdown-menu" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" href="#">Profile</a></li>
                            <li><a class="dropdown-item" href="#">Another action</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
                <form class="d-flex" method="get" action="/jobs">
                    <input class="form-control me-2" type="search" name="keyword" placeholder="Search" aria-label="Search">
                    <button class="btn btn-outline-success" type="submit">Search</button>
                </form>

            </div>
        </div>
    </nav>
    <div class="row p-4 d-flex justify-content-center">
        <div class="col-md-11">

            <h3>General Dashboard</h3>

            <a class="btn btn-info" th:href="@{/jobs/detail}">Create new</a>

            <hr>

            <table class="table">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">Title</th>
                    <th scope="col">Description</th>
                    <th scope="col">Location</th>
                    <th scope="col">Min Salary</th>
                    <th scope="col">Max Salary</th>
                    <th scope="col">Status</th>
                    <th scope="col">Deadline</th>
                    <th scope="col">Published At</th>
                    <th scope="col" class="w-25"></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="job: ${jobs}">
                    <td th:text="${job.id}"></td>
                    <td th:text="${job.title}"></td>
                    <td th:text="${job.description}"></td>
                    <td th:text="${job.location}"></td>
                    <td th:text="${job.minSalary}"></td>
                    <td th:text="${job.maxSalary}"></td>
                    <td th:text="${job.status}"></td>
                    <td th:text="${job.deadline}"></td>
                    <td th:text="${job.publishedAt}"></td>
                    <td>
                        <a type="button" href="#" class="btn btn-primary">Edit</a>
                        <a type="button" href="#" class="btn btn-danger" th:id="${job.id}">Delete</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>


    </div>
</div>

</body>
<script type="text/javascript">
    document.querySelectorAll(".btn-danger")
        .forEach((item => item.addEventListener("click", function (event) {
                const id = event.target.id;

                console.log(id);

                const confirm = window.confirm("Do you want delete this");

                if (confirm) {
                    window.location.href = "jobs/" + id + "/delete";
                }
            })
        ));
</script>
</html>
